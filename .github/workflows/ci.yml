name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and run tests (unit + Testcontainers ITs)
        run: mvn -B verify

      - name: Build Docker image
        run: docker build -t lastcall-eats:${{ github.sha }} .
