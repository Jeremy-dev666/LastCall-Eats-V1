spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/lastcall_eats
    username: postgres
    password: ${DB_PASSWORD:postgres}

  jpa:
    show-sql: true

app:
  jwt:
    secret: your-dev-jwt-secret-key-at-least-256-bits-long-please-change
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket-name: lastcall-eats

  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

  order:
    payment-timeout-minutes: 15

server:
  address: 0.0.0.0
